name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Compute release metadata
        id: meta
        run: |
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            RELEASE_TAG="${GITHUB_REF_NAME}"
          else
            RELEASE_TAG="v${PACKAGE_VERSION}"
          fi

          echo "package_version=${PACKAGE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Verify tag matches package version
        if: ${{ github.ref_type == 'tag' }}
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PACKAGE_VERSION="${{ steps.meta.outputs.package_version }}"
          if [ "$TAG_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match package.json version ($PACKAGE_VERSION)"
            exit 1
          fi

      - name: Build release archives
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          RELEASE_TAG: ${{ steps.meta.outputs.release_tag }}
        run: |
          bun run build:release

      - name: Generate release notes
        env:
          RELEASE_TAG: ${{ steps.meta.outputs.release_tag }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          PREVIOUS_TAG="$(git tag --sort=-version:refname | grep '^v' | grep -vx "${RELEASE_TAG}" | head -n1 || true)"
          NOTES_FILE="dist/release/release-notes.md"

          {
            echo "# ${RELEASE_TAG}"
            echo
            echo "## 更新内容"
            echo

            if [ -n "${PREVIOUS_TAG}" ]; then
              git log --no-merges --pretty=format:'- %s (%h)' "${PREVIOUS_TAG}..HEAD"
            else
              git log --no-merges --pretty=format:'- %s (%h)'
            fi

            echo
            echo
            echo "## 发布资产"
            echo
            echo "- 预编译二进制压缩包"
            echo "- checksums.txt"
            echo "- manifest.json"

            if [ -n "${PREVIOUS_TAG}" ]; then
              echo
              echo "## 对比"
              echo
              echo "- https://github.com/${GITHUB_REPOSITORY}/compare/${PREVIOUS_TAG}...${RELEASE_TAG}"
            fi
          } > "${NOTES_FILE}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RELEASE_TAG="${{ steps.meta.outputs.release_tag }}"

          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release edit "${RELEASE_TAG}" \
              --title "${RELEASE_TAG}" \
              --notes-file dist/release/release-notes.md

            gh release upload "${RELEASE_TAG}" \
              dist/release/*.tar.gz \
              dist/release/checksums.txt \
              dist/release/manifest.json \
              --clobber
          else
            gh release create "${RELEASE_TAG}" \
              dist/release/*.tar.gz \
              dist/release/checksums.txt \
              dist/release/manifest.json \
              --title "${RELEASE_TAG}" \
              --notes-file dist/release/release-notes.md
          fi

      - name: Setup Node for npm publish
        if: ${{ env.NPM_TOKEN != '' }}
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Publish package to npm
        if: ${{ env.NPM_TOKEN != '' }}
        env:
          NODE_AUTH_TOKEN: ${{ env.NPM_TOKEN }}
        run: npm publish
