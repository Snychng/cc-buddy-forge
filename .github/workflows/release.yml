name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify tag matches package version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PACKAGE_VERSION="$(bun -e "console.log(JSON.parse(require('fs').readFileSync('package.json', 'utf-8')).version)")"
          if [ "$TAG_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match package.json version ($PACKAGE_VERSION)"
            exit 1
          fi

      - name: Build release archives
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          bun run build:release

      - name: Generate Homebrew formula
        run: bun run generate:formula

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" \
              dist/release/*.tar.gz \
              dist/release/checksums.txt \
              dist/release/manifest.json \
              dist/release/ccbf.rb \
              --clobber
          else
            gh release create "${GITHUB_REF_NAME}" \
              dist/release/*.tar.gz \
              dist/release/checksums.txt \
              dist/release/manifest.json \
              dist/release/ccbf.rb \
              --title "${GITHUB_REF_NAME}" \
              --generate-notes
          fi

      - name: Update Formula on main
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git fetch origin main
          git checkout main
          mkdir -p Formula
          cp dist/release/ccbf.rb Formula/ccbf.rb

          if git diff --quiet -- Formula/ccbf.rb; then
            echo "Formula/ccbf.rb is already up to date"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/ccbf.rb
          git commit -m "chore: update Homebrew formula for ${GITHUB_REF_NAME}"
          git push origin main
